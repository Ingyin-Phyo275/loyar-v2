name: Auto Label PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: Label PR by Branch Name
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Apply label based on branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const labels = [];

            if (branch.startsWith('feature/')) labels.push('feature');
            else if (branch.startsWith('fix/') || branch.startsWith('bugfix/')) labels.push('bugfix');
            else if (branch.startsWith('hotfix/')) labels.push('hotfix');
            else if (branch.startsWith('chore/')) labels.push('chore');
            else if (branch.startsWith('refactor/')) labels.push('refactor');
            else if (branch.startsWith('release/')) labels.push('release');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels,
              });
            }
